services:
  mariadb:
    image: mariadb:10.11
    container_name: capstone-mariadb
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DB_EXTERNAL_PORT}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mariadb/data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: capstone-redis
    restart: unless-stopped
    env_file:
      - .env
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --requirepass
      - "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: capstone-nginx
    depends_on:
      - spring-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - capstone-net

  spring-app:
    build:
      context: ./spring
      dockerfile: Dockerfile
    container_name: capstone-spring-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      # ✅ ai-server depends_on 제거 (Python은 외부 ngrok으로 연결)
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_SERVER_URL: ${AI_SERVER_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      APP_ENV: ${APP_ENV}
      TRYON_MODE: ${TRYON_MODE}
      USE_MOCK: ${USE_MOCK}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      FILE_UPLOAD_ROOT: ${FILE_UPLOAD_ROOT}
      FILE_RESULT_ROOT: ${FILE_RESULT_ROOT}
      APP_UPLOAD_PUBLIC_BASE_URL: ${APP_UPLOAD_PUBLIC_BASE_URL}
      APP_UPLOAD_DIR: "/data/uploads"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/data/uploads
      - app_results:/data/results
    networks:
      - capstone-net

volumes:
  redis_data:
  app_uploads:
  app_results:
  # ✅ model_cache 제거 (우분투에 Python 없음)

networks:
  capstone-net:
    driver: bridge