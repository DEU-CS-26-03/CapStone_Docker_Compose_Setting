services:
  mariadb:
    image: mariadb:10.11
    container_name: capstone-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIA_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIA_DATABASE}
      MARIADB_USER: ${MARIA_USER}
      MARIADB_PASSWORD: ${MARIA_PASSWORD}
      TZ: Asia/Seoul
      # 같은 서버 내부 통신이 아닌 AI 서버 공개 주소로 변경
      PYTHON_SERVICE_URL: ${AI_SERVER_URL:-http://your-gpu-server-ip:8000}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mariadb/data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: capstone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  spring-app:
    # 네 기존 설정 유지
    volumes:
      - app_uploads:/data/uploads
      - app_results:/data/results
    environment:
      FILE_UPLOAD_ROOT: /data/uploads
      FILE_RESULT_ROOT: /data/results

volumes:
  redis_data:
  app_uploads:
  app_results: