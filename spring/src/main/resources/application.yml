spring:
  main:
    allow-circular-references: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:capstone}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:capstone}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:capstone}}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 3s
        shutdown-timeout: 100ms

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

app:
  env: ${APP_ENV:local}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  ai-server-url: ${AI_SERVER_URL:https://urchin-evil-reborn.ngrok-free.dev:8000}
  use-mock: ${USE_MOCK:false}
  base-url: ${BASE_URL:http://localhost:8080}
  upload:
    dir: ${APP_UPLOAD_DIR:/home/ubuntu/CapStone_Docker_Compose_Setting/result_uploads}
    public-base-url: ${APP_UPLOAD_PUBLIC_BASE_URL:http://217.142.255.158/uploads}
    upload-root: ${FILE_UPLOAD_ROOT:/data/uploads}
    result-root: ${FILE_RESULT_ROOT:/data/results}

tryon:
  mode: ${TRYON_MODE:mock}
  mock: ${USE_MOCK:true}

file:
  upload-root: ${FILE_UPLOAD_ROOT:/data/uploads}
  result-root: ${FILE_RESULT_ROOT:/data/results}
  result-base-url: http://217.142.255.158:8080
  upload:
    user-images-dir: ${USER_IMAGES_DIR:/data/uploads/user-images}
    garments-dir: ${GARMENTS_DIR:/data/uploads/garments}
    results-dir: ${RESULTS_DIR:/data/results}

python:
  inference:
    base-url: ${AI_SERVER_URL:https://urchin-evil-reborn.ngrok-free.dev}
    infer-path: /infer
    health-path: /health
    connect-timeout-ms: 3000
    read-timeout-ms: 180000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    com.capstone: DEBUG
    org.springframework.web: DEBUG

ai:
  server:
    url: ${AI_SERVER_URL:http://ai-server:8000}

storage:
  s3:
    enabled: false
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:ap-northeast-2}
    bucket: ${S3_BUCKET:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}