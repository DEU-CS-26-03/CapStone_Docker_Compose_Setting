spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB     # 파일 1개 최대
      max-request-size: 50MB  # person + garment 합산

file:
  upload-root: ${FILE_UPLOAD_ROOT:/tmp/uploads}
  result-root: ${FILE_RESULT_ROOT:/tmp/results}
  upload:
    user-images-dir: /app/uploads/user-images
    garments-dir: /app/uploads/garments
    results-dir: /app/uploads/results

server:
  port: 8080

python:
  service:
    url: ${PYTHON_SERVICE_URL:http://capstone-python:8000}
  inference:
    base-url: http://localhost:8000  # Python 추론 서버 주소
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-long-enough}
  expiration: ${JWT_EXPIRATION:3600000}
